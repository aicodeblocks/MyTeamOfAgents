name: PR auto-merge on approval

on:
  pull_request_review:
    types:
      - submitted
  workflow_dispatch:
    inputs:
      pr_number:
        description: Pull request number to process manually
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  enable-auto-merge:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.review.state == 'approved' &&
        github.event.pull_request.base.ref == 'main' &&
        (
          github.event.review.user.login == 'codeahmed' ||
          github.event.review.user.login == 'CodeAhmed'
        )
      )
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Enable auto-merge
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ inputs.pr_number || github.event.pull_request.number }}
        run: |
          chmod +x infra/scripts/gh-enable-pr-automerge.sh
          infra/scripts/gh-enable-pr-automerge.sh "$PR_NUMBER"
